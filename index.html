<html>
    <head>
        <title> VNWare </title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" type="text/css" href="defaults.css">
        <link rel="manifest" href="/manifest.json">
        <!-- <meta name="viewport" content="width=device-width, initial-scale=2.0"> -->
    </head>
    <script src="main.js" defer></script>
    <script src="ui.js" defer></script>
    <script src="settings.js" defer></script>
    <script src="objects/characters.js" defer></script>
    <script src="objects/scenes.js" defer></script>
    <script src="logs.js" defer></script>
    <body>
        <div id="bg"></div>
        <div id="fg">
            <!-- <img src="assets/chars/haibara.webp" class="standing" id="character-1">
            <img src="assets/chars/haibara.webp" class="talking" id="character-2">
            <img src="assets/chars/haibara.webp" class="listening" id="character-3">
            <img src="assets/chars/haibara.webp" class="hidden" id="character-4"> -->
        </div>
        
        <div id="dialogueBox">
            <div id="choiceBox" style="display: none;">
                <p id="choiceLabel"></p>
                <!-- <button> yes </button>
                <button> no </button> -->
            </div>
            <div id="nameBox"><p id="nameLabel">System</p></div>
            <div id="dialogueControlPanel">
                <button id="logsBtn" onclick="toggleSidebarDisplay('logsUI', 'right'); addToLogDisplay()"> <img src="assets/UI/log.webp"> </button>
                <button id="autoplayBtn" onclick="toggleAutoPlay()"> <img src="assets/UI/autoplay.webp"> </button>
            </div>
            <p id="noticeLabel" style="opacity: 0;"> Autoplay is on. </p>
            <p id="dialogueLabel"> Click me to start! </p>
            <button id="nextBtn"> ▼ </button>
        </div>
        <div id="controlPanel">
            <button id="returnBtn" class="hoverSound" onclick="returnToMenu()"> <img src="assets/UI/exit.webp"> </button>
            <button id="settingsBtn" class="hoverSound" onclick="toggleSidebarDisplay(`settingsUI`)"><img src="assets/UI/settings.webp"></button>
            <button id="saveBtn" class="hoverSound" onclick="toggleSidebarDisplay(`storageUI`)"> <img src="assets/UI/save_icon.webp"> </button>
            <!-- <button id="loadBtn"> Load </button> -->
        </div>
        
        <div id="storageUI" class="sideBar" style="display:  none;">
            <button id="backBtn" onclick="toggleSidebarDisplay(`storageUI`)">◄ Close</button>
            <h2 style="margin: 0; padding: 10px; color: rgb(116, 98, 122);">Saves</h2>
            <hr style="width: 100%;">

            <div id="storageRows">
                <div class="storageSlot">
                    <label> Slot 1 :</label>
                    <input value="" id="Slot-1" readonly>
                    <div style="display: flex; flex-direction: row; justify-content: flex-start; align-items: center; gap: 10px;">
                        <button onclick="saveRun('Slot-1')"> Save </button>
                        <button onclick="loadRun('Slot-1')"> Load </button>
                    </div>
                </div>

                <div class="storageSlot">
                    <label> Slot 2 :</label>
                    <input value="" id="Slot-2" readonly>
                    <div style="display: flex; flex-direction: row; justify-content: flex-start; align-items: center; gap: 10px;">
                        <button onclick="saveRun('Slot-2')"> Save </button>
                        <button onclick="loadRun('Slot-2')"> Load </button>
                    </div>
                </div>


                <div class="storageSlot">
                    <label> Slot 3 :</label>
                    <input value="" id="Slot-3" readonly>
                    <div style="display: flex; flex-direction: row; justify-content: flex-start; align-items: center; gap: 10px;">
                        <button onclick="saveRun('Slot-3')"> Save </button>
                        <button onclick="loadRun('Slot-3')"> Load </button>
                    </div>
                </div>

                <div class="storageSlot">
                    <label> Slot 4 :</label>
                    <input value="" id="Slot-4" readonly>
                    <div style="display: flex; flex-direction: row; justify-content: flex-start; align-items: center; gap: 10px;">
                        <button onclick="saveRun('Slot-4')"> Save </button>
                        <button onclick="loadRun('Slot-4')"> Load </button>
                    </div>
                </div>



            </div>
        </div>

        <div id="settingsUI" class="sideBar" style="display:  none;">
            <button id="backBtn" onclick="toggleSidebarDisplay(`settingsUI`); applySettings()">◄ Close and apply</button>
            <h2 style="margin: 0; padding: 10px; color: rgb(116, 98, 122);">Settings</h2>
            <hr style="width: 100%;">
            <div id="settingsRows">
                <div>
                    <label for="volumeInput" id="volumeLabel"> Music volume:  </label>
                    <input id="volumeInput" class="volumeSliders" type="range" min="0" max="100">
                </div>
                <br>
                <br>
                <div>
                    <label for="typeVolumeInput" id="volumeLabel"> Dialogue type volume:  </label>
                    <input id="typeVolumeInput" class="volumeSliders" type="range" min="0" max="100">
                </div>
            </div>
        </div>

        <div id="logsUI" style="display: none;">
            <button id="backBtn" onclick="toggleSidebarDisplay(`logsUI`, 'right');"> Close ► </button>
            <h2 style="margin: 0; padding: 10px; color: rgb(116, 98, 122);">Logs</h2>
            <hr style="width: 100%;">
            <div id="logsColumn">
                <div class="logsRows" style="margin-bottom: 10px; width: 100%; border-radius: 5px; display: flex; flex-direction: row; justify-content: flex-start; align-items: center; background-color: rgba(138, 115, 146, 0.9); color: white; font-family: 'Commissioner';">
                    <label style="border-radius: 3px; padding: 0; margin: 5px; width: 30%; background-color: rgb(116, 98, 122);"> Name:  </label> 
                    <p style="padding: 0; margin: 5px; width: 70%;"> Dialogue... </p>
                </div>
            </div>
        </div>

        <div id="overlay"></div>
        <div id="blur"></div>
        <div id="blocker"></div>
        <div id="menuBg"></div>

        <div id="audioPermission">
            <h3 style="transition: 1s;">Welcome to my VN Framework demo!, this was made using HTML, CSS, and JS. <br> This is not an actual visual novel (yet), so don't expect a story here, <br> Anyways... enjoy your stay!!!</h3>
            <button onclick="getPermission(); toggleAudioPerm(); lockLandscape();"> Enter! </button>
        </div>
        

        <div id="mainMenu">
            <h1 id="mainTitle"> A day in Beika </h1>
            <hr>
            <div id="menuBtnContainer">
                <button onclick="newGame()"> ► New Game </button>
                <button onclick="loadRun('CSlot')"> ► Continue</button>
                <!-- <button onclick="toggleStorageDisplay();"> ► Load Save</button> -->
            </div>
            <img class="character" style="position:fixed; height: 10%; bottom: 0; left: 0; z-index: 3000;" src="assets/chars/hagiwara.webp">
        </div>

    </body>
</html>
